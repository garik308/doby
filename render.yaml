version: "1.0"

services:
  - type: web
    name: doby-web
    repo: https://github.com/garik308/doby
    branch: master
    dockerfilePath: ./Dockerfile
    preDeployCommand: "python manage.py migrate --noinput && python manage.py collectstatic --noinput"
    envVars:
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: POSTGRES_DB
        fromDatabase:
          name: doby-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: doby-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: doby-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: doby-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: doby-db
          property: port
      - key: REDIS_URL
        fromService:
          name: doby-redis
          type: redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "doby-x7do.onrender.com"
      - key: DJANGO_SETTINGS_MODULE
        value: "doby.settings_prod"
    healthCheckPath: /health/

  - type: redis
    name: doby-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all

  - type: worker
    name: doby-celery-worker
    dockerfilePath: ./Dockerfile
    command: "celery -A doby worker --loglevel=info"
    envVars:
      - key: REDIS_URL
        fromService:
          name: doby-redis
          type: redis
          property: connectionString
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: POSTGRES_DB
        fromDatabase:
          name: doby-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: doby-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: doby-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: doby-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: doby-db
          property: port
      - key: DJANGO_SETTINGS_MODULE
        value: "doby.settings_prod"

databases:
  - name: doby-db
    databaseName: doby_db
    user: doby_user
    plan: free