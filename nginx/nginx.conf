server {
    listen 80;
    server_name doby.ru;   # или ваш домен
    charset utf-8;

    # Максимальный размер загружаемых файлов (через прокси)
    client_max_body_size 100M;

    # Отдача статики (без подписей)
    location /static/ {
        alias /static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Защищённые медиа – проверяем подпись через secure_link
    location /protected/ {
        internal;
        alias /protected/;
    }

    # Все остальные запросы – проксируем на Django
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Для WebSocket (если используете Channels)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}