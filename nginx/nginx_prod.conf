events {}

http {
    include /etc/nginx/mime.types;
    server_tokens off;
    client_max_body_size 100M;

    server {
        listen 80;
        server_name dobyapi.site www.dobyapi.site;   # или ваш домен
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name dobyapi.site www.dobyapi.site;
        charset utf-8;

        ssl_certificate /etc/letsencrypt/live/dobyapi.site/fulichain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dobyapi.site/privkey.pem;


        location /static/ {
            alias /static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias /media/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /protected/ {
            internal;
            alias /protected/;
        }

        location /ws/ {
            proxy_pass http://web:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 3600s;
        }

        location / {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://web:8000;
        }
    }
}
