[tool.poetry]
name = "doby"
version = "0.1.0"
description = "Doby"
authors = ["Your Name <you@example.com>"]
package-mode = false

[tool.poetry.dependencies]
python = "^3.11"
requests = "^2.28.0"
django = "5.2"
django-rest-framework = {extras = ["sidecar"], version = "^0.1.0"}
rest-framework-simplejwt = "^0.0.2"
djangorestframework-simplejwt = "^5.5.1"
channels = "^4.3.2"
psycopg2 = "^2.9.11"
psycopg2-binary = "^2.9.11"
pillow = "^12.1.1"
drf-spectacular = "^0.29.0"
sidecar = "^0.8.1"
